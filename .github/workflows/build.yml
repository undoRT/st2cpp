name: Build and Release

on:
  push:
    branches:
      - main
      - develop
      - 'feature/*'
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:

  #
  # =========================
  # Linux builds (portable)
  # =========================
  #
  build-linux:
    name: Build ${{ matrix.name }}

    runs-on: ${{ matrix.runner }}

    container:
      image: debian:11

    strategy:
      fail-fast: false

      matrix:
        include:
          - name: linux-x64
            runner: ubuntu-latest
            archive_name: st2cpp-linux-x64.tar.gz
            package_dir: st2cpp-linux-x64

          - name: linux-arm64
            runner: ubuntu-24.04-arm
            archive_name: st2cpp-linux-arm64.tar.gz
            package_dir: st2cpp-linux-arm64

    steps:
      # Install Git 2.18+ from backports (required for submodule support)
      - name: Install Git from backports
        run: |
          echo "deb http://deb.debian.org/debian bullseye-backports main" >> /etc/apt/sources.list
          apt update
          apt install -y -t bullseye-backports git

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          apt update
          apt install -y \
            build-essential \
            cmake \
            g++ \
            git \
            libgtest-dev

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTS=ON \
            -DCMAKE_EXE_LINKER_FLAGS="-static-libstdc++ -static-libgcc"

      - name: Build compiler and tests
        run: |
          cmake --build build \
            --target st2cpp \
            --target st2cpp_tests \
            -j$(nproc)

      - name: Run tests
        run: |
          cd build
          ctest --output-on-failure --verbose

      - name: Package
        run: |
          PACKAGE_DIR="${{ matrix.package_dir }}"

          mkdir -p "$PACKAGE_DIR"

          cp build/st2cpp "$PACKAGE_DIR/st2cpp"

          cp README.md "$PACKAGE_DIR/"
          cp LICENSE "$PACKAGE_DIR/"
          cp CHANGELOG.md "$PACKAGE_DIR/" 2>/dev/null || true

          cp -r st2cpp_includes "$PACKAGE_DIR/"

          if [ -d tests ]; then
            cp -r tests "$PACKAGE_DIR/"
          fi

          tar czf "${{ matrix.archive_name }}" "$PACKAGE_DIR"

      - name: Upload artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: ${{ matrix.archive_name }}
          if-no-files-found: error

  #
  # =========================
  # Windows + macOS builds
  # =========================
  #
  build-native:
    name: Build ${{ matrix.name }}

    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false

      matrix:
        include:

          - name: win-x64
            runner: windows-latest
            artifact_name: build/Release/st2cpp.exe
            asset_name: st2cpp.exe
            archive_name: st2cpp-win-x64.zip
            package_dir: st2cpp-win-x64

          - name: macos-arm64
            runner: macos-latest
            artifact_name: build/st2cpp
            asset_name: st2cpp
            archive_name: st2cpp-macos-arm64.tar.gz
            package_dir: st2cpp-macos-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake googletest

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          vcpkg install gtest:x64-windows

      - name: Configure CMake (macOS)
        if: runner.os == 'macOS'
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTS=ON

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTS=ON \
            -DCMAKE_TOOLCHAIN_FILE="${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake"

      - name: Build compiler and tests
        run: |
          cmake --build build --config Release --target st2cpp st2cpp_tests -j

      - name: Run tests (Unix)
        if: runner.os != 'Windows'
        run: |
          cd build
          ctest --output-on-failure --verbose

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd build
          $env:PATH = "$env:PATH;$(pwd)\Release"
          ctest --output-on-failure --verbose

      #
      # macOS packaging
      #
      - name: Package macOS
        if: runner.os == 'macOS'
        run: |
          PACKAGE_DIR="${{ matrix.package_dir }}"

          mkdir -p "$PACKAGE_DIR"

          cp "${{ matrix.artifact_name }}" \
             "$PACKAGE_DIR/${{ matrix.asset_name }}"

          cp README.md "$PACKAGE_DIR/"
          cp LICENSE "$PACKAGE_DIR/"
          cp CHANGELOG.md "$PACKAGE_DIR/" 2>/dev/null || true

          cp -r st2cpp_includes "$PACKAGE_DIR/"

          if [ -d tests ]; then
            cp -r tests "$PACKAGE_DIR/"
          fi

          tar czf "${{ matrix.archive_name }}" "$PACKAGE_DIR"

      #
      # Windows packaging
      #
      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $PACKAGE_DIR = "${{ matrix.package_dir }}"

          New-Item `
            -ItemType Directory `
            -Force `
            -Path $PACKAGE_DIR

          Copy-Item `
            "${{ matrix.artifact_name }}" `
            "$PACKAGE_DIR/${{ matrix.asset_name }}"

          Copy-Item "README.md" $PACKAGE_DIR
          Copy-Item "LICENSE" $PACKAGE_DIR
          Copy-Item "CHANGELOG.md" $PACKAGE_DIR -ErrorAction SilentlyContinue

          Copy-Item `
            "st2cpp_includes" `
            $PACKAGE_DIR `
            -Recurse

          if (Test-Path "tests") {
            Copy-Item "tests" $PACKAGE_DIR -Recurse
          }

          Compress-Archive `
            -Path $PACKAGE_DIR `
            -DestinationPath "${{ matrix.archive_name }}"

      - name: Upload artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: ${{ matrix.archive_name }}
          if-no-files-found: error

  #
  # =========================
  # Quick test job (runs on every PR and push)
  # =========================
  #
  test-quick:
    name: Quick Tests (Ubuntu)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            cmake \
            g++ \
            git \
            libgtest-dev

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TESTS=ON

      - name: Build tests
        run: |
          cmake --build build \
            --target st2cpp_tests \
            -j$(nproc)

      - name: Run tests
        run: |
          cd build
          ctest --output-on-failure --verbose

  #
  # =========================
  # Code Coverage
  # =========================
  #
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            cmake \
            g++ \
            git \
            libgtest-dev \
            lcov

      - name: Configure CMake with coverage
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TESTS=ON \
            -DCMAKE_CXX_FLAGS="--coverage"

      - name: Build tests
        run: |
          cmake --build build \
            --target st2cpp_tests \
            -j$(nproc)

      - name: Run tests with coverage
        run: |
          cd build
          ctest --output-on-failure

      - name: Generate coverage report
        run: |
          cd build
          lcov --capture --directory . --output-file coverage.info
          lcov --remove coverage.info '/usr/*' --output-file coverage.info
          lcov --list coverage.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./build/coverage.info
          fail_ci_if_error: false

  #
  # =========================
  # GitHub Release
  # =========================
  #
  release:
    needs:
      - build-linux
      - build-native

    runs-on: ubuntu-latest

    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Debug - list artifacts
        run: |
          find artifacts -type f
          ls -la artifacts/*/

      - name: Create Release
        run: |
          RELEASE_NOTES="st2cpp ${{ github.ref_name }}

          ## Bundled Components
          - undoCore: included as submodule in st2cpp_includes/

          ## Installation
          Extract the archive and run:
          - Linux/macOS: ./st2cpp --help
          - Windows: st2cpp.exe --help

          ## Runtime Headers
          The runtime headers (undoCore) are included in st2cpp_includes/.
          To compile generated C++ code, add:
          - Linux/macOS: -I./st2cpp_includes/undoCore/include
          - Windows: /I./st2cpp_includes/undoCore/include
          "

          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "st2cpp ${{ github.ref_name }}" \
            --notes "$RELEASE_NOTES" \
            artifacts/st2cpp-linux-x64.tar.gz/st2cpp-linux-x64.tar.gz \
            artifacts/st2cpp-linux-arm64.tar.gz/st2cpp-linux-arm64.tar.gz \
            artifacts/st2cpp-win-x64.zip/st2cpp-win-x64.zip \
            artifacts/st2cpp-macos-arm64.tar.gz/st2cpp-macos-arm64.tar.gz

        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}